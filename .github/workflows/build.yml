name: Build & Test

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-packages:
    name: Swift Package Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch sibling repos (strimr, MPVKit)
        env:
          STRIMR_REPO: "bballdavis/strimr"
          STRIMR_REF: "plinx-patches"
          STRIMR_PAT: ${{ secrets.STRIMR_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Cloning ${STRIMR_REPO}@${STRIMR_REF} into ../strimr"
          # Always clone the fork — fail fast if no auth token available
          AUTH_TOKEN="${STRIMR_PAT:-$GITHUB_TOKEN}"
          if [ -z "$AUTH_TOKEN" ]; then
            echo "Error: no STRIMR_PAT or GITHUB_TOKEN available to clone ${STRIMR_REPO}."
            echo "This workflow requires access to the forked repository; please add STRIMR_PAT as a secret if needed."
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${AUTH_TOKEN}@github.com/${STRIMR_REPO}.git" ../strimr
          git -C ../strimr fetch --depth=1 origin ${STRIMR_REF}
          git -C ../strimr checkout ${STRIMR_REF}

          echo "Cloning MPVKit into ../MPVKit"
          git clone --depth 1 https://github.com/wunax/MPVKit.git ../MPVKit || true
          git -C ../MPVKit fetch --depth=1 || true

      - name: Test PlinxCore (with coverage)
        run: swift test --package-path Packages/PlinxCore --enable-code-coverage

      - name: Test PlinxUI
        run: swift test --package-path Packages/PlinxUI

      - name: Enforce safety-critical coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          MIN_COVERAGE=90.0
          TEST_ARTIFACT=$(find Packages/PlinxCore/.build -name "*PlinxCorePackageTests.xctest" -maxdepth 5 | head -n 1 || true)
          if [[ -z "$TEST_ARTIFACT" ]]; then
            echo "No test bundle found; failing for safety coverage enforcement."
            exit 1
          fi

          if [[ -d "$TEST_ARTIFACT" ]]; then
            TEST_BINARY=$(find "$TEST_ARTIFACT" -type f -perm -111 | head -n 1 || true)
          else
            TEST_BINARY="$TEST_ARTIFACT"
          fi

          if [[ -z "${TEST_BINARY:-}" ]]; then
            echo "No test binary found in bundle; failing for safety coverage enforcement."
            exit 1
          fi

          PROF_DATA=$(find Packages/PlinxCore/.build -name "default.profdata" -maxdepth 6 | head -n 1 || true)
          if [[ -z "$PROF_DATA" ]]; then
            echo "No coverage data found; failing for safety coverage enforcement."
            exit 1
          fi

          xcrun llvm-cov report \
            "$TEST_BINARY" \
            -instr-profile "$PROF_DATA" \
            Packages/PlinxCore/Sources/PlinxCore/Safety/SafetyInterceptor.swift \
            Packages/PlinxCore/Sources/PlinxCore/Safety/MathGate.swift \
            | tail -n +2 \
            | awk '{ print $1, $4 }' \
            | while read -r file coverage; do
                echo "$file -> $coverage"
                numeric="${coverage%%%}"
                if ! awk -v actual="$numeric" -v minimum="$MIN_COVERAGE" 'BEGIN { exit !(actual >= minimum) }'; then
                  echo "Coverage below ${MIN_COVERAGE}% for $file"
                  exit 1
                fi
              done

  xcode-build-and-test:
    name: Xcode Build & Unit Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: PlinxApp

      - name: Build Plinx-iOS
        run: |
          xcodebuild build \
            -project PlinxApp/Plinx.xcodeproj \
            -scheme Plinx-iOS \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project PlinxApp/Plinx.xcodeproj \
            -scheme Plinx-iOS \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:Plinx-iOS-UnitTests \
            CODE_SIGNING_ALLOWED=NO
