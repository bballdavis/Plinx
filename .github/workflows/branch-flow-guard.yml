name: Branch Flow Guard (Disabled - No Dev Branch)

# DISABLED: This workflow enforces dev->main PR flow, but no dev branch exists locally.
# Re-enable if you establish a proper develop branch strategy.
# To re-enable: change the 'on' trigger back to active and update this file.

on: []  # Disabled: no active triggers

jobs:
  enforce-dev-into-main:
    runs-on: ubuntu-latest
    steps:
      - name: Branch flow check skipped
        run: |
          echo "Branch flow guard is disabled."
          echo "To enable: establish a 'dev' branch and update the workflow trigger."
