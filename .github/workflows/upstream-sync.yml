name: Weekly Upstream Sync

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays at 09:00 UTC
  workflow_dispatch:

jobs:
  upstream-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ensure Vendor/Strimr exists
        id: vendor-check
        run: |
          if [[ ! -d "vendor/strimr" ]]; then
            echo "vendor/strimr not found; skipping sync."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update upstream submodule
        if: steps.vendor-check.outputs.skip != 'true'
        run: |
          git submodule update --init vendor/strimr
          git -C vendor/strimr remote set-url origin https://github.com/wunax/strimr.git
          git -C vendor/strimr fetch origin main
          git -C vendor/strimr checkout main
          git -C vendor/strimr pull --ff-only origin main

      - name: Check for non-UI changes
        if: steps.vendor-check.outputs.skip != 'true'
        id: diffcheck
        run: |
          if git diff --quiet; then
            echo "No changes detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Heuristic: treat changes outside UI-only paths as worth PR review
          CHANGED=$(git diff --name-only | grep -vE 'Screenshots/|Documentation/|.*\.md$|.*\.png$|.*\.jpg$|.*\.xcassets/' || true)
          if [[ -z "$CHANGED" ]]; then
            echo "Only UI/doc asset changes detected; skipping PR."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create PR for upstream updates
        if: steps.diffcheck.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Upstream sync: Strimr updates"
          commit-message: "Sync Strimr upstream"
          branch: "chore/upstream-sync"
          body: "Automated weekly sync from wunax/strimr. Review for non-UI improvements."
          labels: "upstream,review"
