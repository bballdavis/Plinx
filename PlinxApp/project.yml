name: Plinx
options:
  minimumXcodeGenVersion: 2.37.0
  deploymentTarget:
    iOS: 17.0
packages:
  PlinxCore:
    path: ../Packages/PlinxCore
  PlinxUI:
    path: ../Packages/PlinxUI

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.plinx
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  Plinx-iOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Views
    resources:
      - path: Resources
    dependencies:
      - package: PlinxCore
      - package: PlinxUI
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Plinx
        UILaunchStoryboardName: ""
    scheme:
      shared: true
      build:
        targets:
          Plinx-iOS: all
      run:
        config: Debug
      test:
        config: Debug
