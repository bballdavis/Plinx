# ─────────────────────────────────────────────────────────────────────────────
# Plinx — XcodeGen Project Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Architecture: "Skin, Don't Fork"
#
# Strimr sibling-repo sources compile INTO the Plinx-iOS app target (not as a
# separate framework). This is required because Strimr uses `internal` access
# on many types — compiling in the same module is the current way to access
# them without broadening upstream access control.
#
# Dependency flow:
#   PlinxApp (this target)
#     ├── Strimr sources (compiled inline, internal access)
#     ├── PlinxUI (SPM) → PlinxCore (SPM)
#     └── MPVKit (SPM)
#
# Note: Sentry (crash reporting SDK) has been removed entirely as part of the
# zero-collection privacy commitment. Plinx provides its own no-op ErrorReporter
# (PlinxApp/App/ErrorReporter.swift) to satisfy Strimr's dependencies.
#
# ─────────────────────────────────────────────────────────────────────────────

name: Plinx

options:
  minimumXcodeGenVersion: 2.37.0
  deploymentTarget:
    iOS: 17.0
  postGenCommand: >-
    if [ -f ../scripts/patch_resources.py ]; then
      python3 ../scripts/patch_resources.py;
    else
      echo "Skipping local resource patch script in non-local environment.";
    fi

packages:
  PlinxCore:
    path: ../Packages/PlinxCore
  PlinxUI:
    path: ../Packages/PlinxUI
  MPVKit:
    path: ../../MPVKit

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.bballdavis.plinx
    # Team ID for code signing (do NOT include this in the bundle identifier)
    DEVELOPMENT_TEAM: Z8F9MLDQGX
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_OBJC_INTEROP_MODE: objcxx
    # Plinx branding — no Strimr references leak into the binary
    PRODUCT_NAME: Plinx

targets:
  Plinx-iOS:
    type: application
    platform: iOS

    sources:
      # ── Plinx application code ──────────────────────────────────────
      - path: App
      - path: Views
      - path: Decorators
      - path: Adapters
      - path: ViewModels

      # ── Strimr sibling-repo sources (compiled into app module) ──────
      # These compile as part of the Plinx-iOS module, giving our
      # decorators and adapters access to Strimr's internal types.
      - path: ../../strimr/Shared
        name: StrimrShared
        excludes:
          # VLC player — Plinx uses MPVKit exclusively
          - "Library/VLC/**"
          # PlaybackLauncher has a @MainActor isolation violation that
          # is a hard error in the Swift 6.2 compiler. Replaced by
          # Adapters/PlinxPlaybackLauncher.swift with the fix.
          # Upstream PR: fix `play()` actor isolation on `settingsManager.playback`
          - "Features/Player/PlaybackLauncher.swift"
          # PlayerFactory static methods call @MainActor initializers from
          # nonisolated context. Replaced by Adapters/PlinxPlayerFactory.swift.
          - "Library/Player/PlayerFactory.swift"
          # MediaBackdropGradient uses Color.background which is ambiguous
          # in iOS 26 SDK (resolves to BackgroundStyle, not Color).
          # Replaced by Adapters/PlinxMediaBackdropGradient.swift.
          - "Views/Media/MediaBackdropGradient.swift"
          # ErrorReporter would initialize Sentry. Plinx has zero data collection,
          # so we provide our own no-op ErrorReporter instead (App/ErrorReporter.swift).
          # See DATA_COLLECTION_AUDIT.md for privacy rationale.
          - "Monitoring/ErrorReporter.swift"
      - path: ../../strimr/Strimr-iOS/Features
        name: StrimrIOSFeatures
        excludes:
          # Strimr's own app entry point — we use PlinxApp.swift
          - "../StrimrApp.swift"
          # These views reference Strimr's asset catalog (Image(.icon) etc.)
          # and are replaced by Plinx-branded stubs in Views/Auth/.
          # Their ViewModels in Shared/ and Auth/SignInViewModel.swift still compile.
          - "Auth/SignInView.swift"
          - "Auth/ProfileSelection/ProfileSwitcherView.swift"
          - "Auth/ServerSelection/SelectServerView.swift"
          # Strimr's MainTabView uses iOS 18+ Tab API; Plinx has its own
          # RootTabView with Liquid Glass tab bar.
          - "Tab/MainTabView.swift"
          # Strimr's ContentView — replaced by PlinxContentView.swift
          - "ContentView.swift"

    resources:
      # Privacy manifest (required for App Store)
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources/Assets.xcassets
      - path: Resources/LaunchScreen.storyboard
      # Localized strings — listed explicitly because xcodegen skips xcstrings
      # and needs lproj bundles spelled out.
      - path: Resources/en.lproj/Plinx.strings
      - path: ../../strimr/Localizable.xcstrings

    dependencies:
      - package: PlinxCore
      - package: PlinxUI
      - package: MPVKit
        product: MPVKit-GPL

    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Plinx
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        # Ensure Strimr code compiles with our Swift version
        SWIFT_VERSION: 5.0
        # Strimr code has actor-isolation violations that are
        # errors in the Swift 6 compiler even with Swift 5 language mode.
        # Minimal concurrency turns them into warnings until vendor fixes.
        SWIFT_STRICT_CONCURRENCY: minimal
        # Override: force the frontend to treat concurrency as minimal.
        # This is needed because Xcode 26's toolchain promotes some
        # isolation checks to errors even under Swift 5 + minimal mode.
        # Remove once Strimr fixes its actor isolation (file upstream PR).
        OTHER_SWIFT_FLAGS: "-Xfrontend -strict-concurrency=minimal -Xfrontend -disable-dynamic-actor-isolation"

    scheme:
      shared: true
      build:
        targets:
          Plinx-iOS: all
      testTargets:
        - Plinx-iOS-UITests
        - Plinx-iOS-UnitTests
      run:
        config: Debug
      test:
        config: Debug

  Plinx-iOS-UnitTests:
    type: bundle.unit-test
    platform: iOS

    sources:
      - path: UnitTests

    # Bundle the live-test credentials file so tests running inside the iOS Simulator
    # can load it via Bundle(for: Self.self) — the host filesystem is inaccessible
    # from inside the simulator sandbox.
    # The file is copied to PlinxApp/UnitTests/test_creds.yaml (gitignored)
    # so XcodeGen can include it as an in-tree resource.
    resources:
      - path: UnitTests/test_creds.yaml
        optional: true

    dependencies:
      - target: Plinx-iOS

    settings:
      base:
        PRODUCT_NAME: PlinxUnitTests
        PRODUCT_BUNDLE_IDENTIFIER: com.bballdavis.plinx.unittests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        OTHER_SWIFT_FLAGS: "-Xfrontend -strict-concurrency=minimal"
        # Host the unit tests inside the running app process so they can access
        # all internal types (vendor + Plinx) via @testable import Plinx_iOS.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Plinx.app/Plinx"
        BUNDLE_LOADER: "$(TEST_HOST)"

  Plinx-iOS-UITests:
    type: bundle.ui-testing
    platform: iOS

    sources:
      - path: UITests

    resources:
      - path: UITests/test_creds.yaml
        optional: true

    dependencies:
      - target: Plinx-iOS

    settings:
      base:
        PRODUCT_NAME: PlinxUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.bballdavis.plinx.uitests
        GENERATE_INFOPLIST_FILE: YES
