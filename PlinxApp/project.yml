# ─────────────────────────────────────────────────────────────────────────────
# Plinx — XcodeGen Project Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Architecture: "Skin, Don't Fork"
#
# Strimr vendor sources compile INTO the Plinx-iOS app target (not as a
# separate framework). This is required because Strimr uses `internal` access
# on all types — compiling in the same module is the only way to access them
# without modifying vendor code.
#
# The StrimrEngine SPM package exists alongside for CI validation and future
# migration (when Strimr adds `public` access). It is NOT listed as an app
# dependency to avoid duplicate symbol errors.
#
# Dependency flow:
#   PlinxApp (this target)
#     ├── Strimr sources (compiled inline, internal access)
#     ├── PlinxUI (SPM) → PlinxCore (SPM)
#     ├── MPVKit (SPM)
#     └── Sentry (SPM)
#
# ─────────────────────────────────────────────────────────────────────────────

name: Plinx

options:
  minimumXcodeGenVersion: 2.37.0
  deploymentTarget:
    iOS: 17.0
  postGenCommand: python3 ../.local_dev/patch_resources.py

packages:
  PlinxCore:
    path: ../Packages/PlinxCore
  PlinxUI:
    path: ../Packages/PlinxUI
  # StrimrEngine is intentionally NOT listed here.
  # Vendor sources compile directly into the app target for `internal` access.
  # The StrimrEngine package at ../Packages/StrimrEngine/ exists for:
  #   - Independent build validation (`cd Packages/StrimrEngine && swift build`)
  #   - Future migration when Strimr types become `public`
  MPVKit:
    url: https://github.com/wunax/MPVKit
    exactVersion: 0.41.2
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    exactVersion: 9.1.0

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.plinx
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_OBJC_INTEROP_MODE: objcxx
    # Plinx branding — no Strimr references leak into the binary
    PRODUCT_NAME: Plinx

targets:
  Plinx-iOS:
    type: application
    platform: iOS

    sources:
      # ── Plinx application code ──────────────────────────────────────
      - path: App
      - path: Views
      - path: Decorators
      - path: Adapters
      - path: ViewModels

      # ── Strimr vendor sources (compiled into app module) ────────────
      # These compile as part of the Plinx-iOS module, giving our
      # decorators and adapters access to Strimr's internal types.
      # When StrimrEngine supports direct import, remove these paths
      # and add `- package: StrimrEngine` to dependencies instead.
      - path: ../Vendor/Strimr/Shared
        name: StrimrShared
        excludes:
          # VLC player — Plinx uses MPVKit exclusively
          - "Library/VLC/**"
          # PlaybackLauncher has a @MainActor isolation violation that
          # is a hard error in the Swift 6.2 compiler. Replaced by
          # Adapters/PlinxPlaybackLauncher.swift with the fix.
          # Upstream PR: fix `play()` actor isolation on `settingsManager.playback`
          - "Features/Player/PlaybackLauncher.swift"
          # PlayerFactory static methods call @MainActor initializers from
          # nonisolated context. Replaced by Adapters/PlinxPlayerFactory.swift.
          - "Library/Player/PlayerFactory.swift"
          # MediaBackdropGradient uses Color.background which is ambiguous
          # in iOS 26 SDK (resolves to BackgroundStyle, not Color).
          # Replaced by Adapters/PlinxMediaBackdropGradient.swift.
          - "Views/Media/MediaBackdropGradient.swift"
      - path: ../Vendor/Strimr/Strimr-iOS/Features
        name: StrimrIOSFeatures
        excludes:
          # Strimr's own app entry point — we use PlinxApp.swift
          - "../StrimrApp.swift"
          # These views reference Strimr's asset catalog (Image(.icon) etc.)
          # and are replaced by Plinx-branded stubs in Views/Auth/.
          # Their ViewModels in Shared/ and Auth/SignInViewModel.swift still compile.
          - "Auth/SignInView.swift"
          - "Auth/ProfileSelection/ProfileSwitcherView.swift"
          - "Auth/ServerSelection/SelectServerView.swift"
          # Strimr's MainTabView uses iOS 18+ Tab API; Plinx has its own
          # RootTabView with Liquid Glass tab bar.
          - "Tab/MainTabView.swift"
          # Strimr's ContentView — replaced by PlinxContentView.swift
          - "ContentView.swift"

    resources:
      # Privacy manifest (required for App Store)
      - path: Resources/PrivacyInfo.xcprivacy
      # Localized strings — listed explicitly because xcodegen skips xcstrings
      # and needs lproj bundles spelled out.
      - path: Resources/en.lproj/Plinx.strings
      - path: ../Vendor/Strimr/en.lproj/Localizable.strings

    dependencies:
      - package: PlinxCore
      - package: PlinxUI
      - package: MPVKit
        product: MPVKit-GPL
      - package: Sentry

    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Plinx
        UILaunchStoryboardName: ""

    settings:
      base:
        # Ensure vendor code compiles with our Swift version
        SWIFT_VERSION: 5.0
        # Vendor code (Strimr) has actor-isolation violations that are
        # errors in the Swift 6 compiler even with Swift 5 language mode.
        # Minimal concurrency turns them into warnings until vendor fixes.
        SWIFT_STRICT_CONCURRENCY: minimal
        # Override: force the frontend to treat concurrency as minimal.
        # This is needed because Xcode 26's toolchain promotes some
        # isolation checks to errors even under Swift 5 + minimal mode.
        # Remove once Strimr fixes its actor isolation (file upstream PR).
        OTHER_SWIFT_FLAGS: "-Xfrontend -strict-concurrency=minimal -Xfrontend -disable-dynamic-actor-isolation"

    scheme:
      shared: true
      build:
        targets:
          Plinx-iOS: all
      testTargets:
        - Plinx-iOS-UITests
      run:
        config: Debug
      test:
        config: Debug

  Plinx-iOS-UITests:
    type: bundle.ui-testing
    platform: iOS

    sources:
      - path: UITests

    dependencies:
      - target: Plinx-iOS

    settings:
      base:
        PRODUCT_NAME: PlinxUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.example.plinx.uitests
        GENERATE_INFOPLIST_FILE: YES
